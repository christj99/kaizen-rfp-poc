mode: manual
screening:
  threshold_pursue: 75
  threshold_maybe: 50
drafting:
  auto_draft_threshold: 80
sources:
  email:
    enabled: true
    primary: true
    adapters:
    - name: demo_gmail
      type: imap
      host: imap.gmail.com
      port: 993
      username_env: DEMO_EMAIL_USERNAME
      password_env: DEMO_EMAIL_PASSWORD
      folder: INBOX
      poll_interval_minutes: 2
      mark_as_read: true
      parse_strategy:
        pdf_attachments: true
        text_body: true
        digest_parser: false
      use_llm_extraction: false
  sam_gov:
    enabled: true
    primary: false
    adapters:
    - name: sam_gov_primary
      type: sam_gov_api
      api_key_env: SAM_GOV_API_KEY
      naics_filter:
      - '541511'
      - '541512'
      - '541519'
      - '541690'
      - '518210'
      poll_interval_hours: 4
      fallback_strategy:
        try_description_endpoint: true
        on_description_failure: flag_for_manual_review
  manual_upload:
    enabled: true
    primary: false
  url_ingest:
    enabled: true
    primary: false
slack:
  enabled: true
  notification_threshold: 50
llm:
  model: claude-sonnet-4-5
  max_tokens: 8192
  temperature: 0.3
