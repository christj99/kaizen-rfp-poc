# Top-level runtime config. Phase 0 scaffold — the API reads this starting Phase 1.
mode: manual                          # manual | chain | full_auto

screening:
  threshold_pursue: 75
  threshold_maybe: 50

drafting:
  auto_draft_threshold: 90

sources:
  sam_gov:
    enabled: true
    naics_filter: ["541511", "541512", "541519", "541690"]
    poll_interval_hours: 4
  email:
    enabled: false                    # stretch goal
  manual_upload:
    enabled: true

slack:
  enabled: true
  notification_threshold: 75

llm:
  model: "claude-sonnet-4-5"
  # Screening output is a rich JSON payload (rubric breakdown + disqualifiers +
  # dimensions + deal_breakers + open_questions + similar-proposal analysis);
  # 4096 tokens truncates the response on realistic RFPs. 8192 gives headroom.
  max_tokens: 8192
  temperature: 0.3
