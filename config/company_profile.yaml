boilerplate_content:
  # Used by drafting agent as static content across proposals
  exec_summary_opener: >
    Meridian Data Solutions is pleased to submit this proposal to
    {{agency_name}} in response to {{solicitation_number}}. With over a
    decade of federal and state data modernization experience and a CMMI
    Level 3-appraised delivery organization, Meridian is uniquely positioned
    to deliver the outcomes {{agency_name}} seeks under this requirement.
  qualifications_standard_blurb: >
    Founded in 2015 and headquartered in Silver Spring, Maryland, Meridian
    Data Solutions employs 118 data engineers, architects, and analysts
    focused exclusively on government data modernization. Our firm holds
    an active Secret facility clearance, ISO 9001:2015 and ISO 27001:2022
    certifications, and delivers against a CMMI Level 3-appraised process
    framework.
  quality_commitment: >
    Every Meridian engagement follows our Mission Delivery Framework, which
    combines Agile delivery practices with our CMMI Level 3 process
    controls. Weekly status reviews, monthly technical reviews, and
    quarterly executive briefings ensure full transparency with our
    government partners throughout the engagement lifecycle.

