mission: >
  Meridian Data Solutions builds modern data platforms for federal and state
  agencies. We help government organizations consolidate legacy data systems,
  operationalize analytics, and responsibly deploy AI for mission delivery.
  Our work focuses on high-stakes domains where data quality, auditability,
  and compliance are non-negotiable.

positioning:
  primary_market: "federal_civilian"
  secondary_market: "state_local"
  market_mix_percent:
    federal_civilian: 55
    state_local: 35
    federal_defense: 10
  ideal_customer_profile: >
    Federal civilian agencies and state-level data organizations modernizing
    legacy data infrastructure, with active executive sponsorship and
    three-to-five-year modernization roadmaps.

capabilities:
  core:
    - name: "Cloud data platform engineering"
      depth: "deep"
      description: >
        Design and implementation of cloud-native data warehouses,
        lakehouses, and data mesh architectures on AWS, Azure, and GCP.
        Snowflake and Databricks delivery experience across 40+ projects.
    - name: "ETL/ELT and data pipeline engineering"
      depth: "deep"
      description: >
        Production data pipelines using Airflow, dbt, Fivetran, and
        custom Python frameworks. Strong track record migrating
        SSIS and Informatica workloads to modern orchestration.
    - name: "Analytics and BI enablement"
      depth: "deep"
      description: >
        Tableau, Power BI, and Looker dashboard development; semantic
        layer design; executive reporting for mission-critical KPIs.
    - name: "Data governance and quality"
      depth: "deep"
      description: >
        Collibra and Alation implementations; custom data quality
        frameworks; FISMA-aligned data classification and lineage.
  emerging:
    - name: "Applied AI/ML for government"
      depth: "growing"
      description: >
        LLM-based document processing, classification workflows,
        and RAG implementations. Four delivered projects; actively
        expanding team.
    - name: "Geospatial analytics"
      depth: "moderate"
      description: >
        ESRI ArcGIS and open-source geospatial stack for mapping,
        location intelligence, and spatial analysis use cases.
  explicitly_not:
    - "Custom application development outside of data domain"
    - "Hardware procurement or integration"
    - "Enterprise ERP implementation"
    - "Cybersecurity penetration testing or SOC services"

